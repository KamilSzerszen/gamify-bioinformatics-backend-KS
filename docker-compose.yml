version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: bio-postgres
    environment:
      POSTGRES_DB: bioinformatics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: bio-app
    env_file:
      - .env
    ports:
      - "10000:10000"
    depends_on:
      - postgres

volumes:
  postgres_data: